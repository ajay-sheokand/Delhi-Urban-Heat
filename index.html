<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Delhi Urban Thermal Analysis | Geospatial Framework</title>
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* Academic Info Panel */
        .panel {
            position: absolute; top: 20px; left: 20px; z-index: 1;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); max-width: 300px;
        }
        h1 { font-size: 16px; margin: 0 0 10px 0; color: #333; }
        p { font-size: 12px; color: #666; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="panel">
        <h1>Delhi Urban Thermal Analysis</h1>
        <p>This visualization renders satellite-derived surface temperature anomalies across Delhi's administrative districts. Data processed via Landsat 8/9 C2 L2 pipeline.</p>
    </div>

    <div id="map"></div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://demotiles.maplibre.org/style.json',
            center: [77.1025, 28.6139], // Centered on Delhi
            zoom: 10.5
        });

        map.on('load', () => {
            // Load the GeoJSON file
            map.addSource('districts', {
                type: 'geojson',
                data: 'delhi_admin.geojson' 
            });

            // Add the district boundaries
            map.addLayer({
                id: 'district-layer',
                type: 'line',
                source: 'districts',
                paint: {
                    'line-color': '#2c3e50',
                    'line-width': 2,
                    'line-opacity': 0.8
                }
            });

            // Optional: Add a hover effect for professionalism
            map.on('mouseenter', 'district-layer', () => { map.getCanvas().style.cursor = 'pointer'; });
            map.on('mouseleave', 'district-layer', () => { map.getCanvas().style.cursor = ''; });
        });
    </script>
</body>
</html>
