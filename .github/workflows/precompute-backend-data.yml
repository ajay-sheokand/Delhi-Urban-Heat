name: Precompute Backend Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  precompute-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate required secrets
        env:
          GEE_SERVICE_ACCOUNT: ${{ secrets.GEE_SERVICE_ACCOUNT }}
          GEE_PRIVATE_KEY: ${{ secrets.GEE_PRIVATE_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          if [ -z "$GEE_SERVICE_ACCOUNT" ]; then
            echo "Missing secret: GEE_SERVICE_ACCOUNT"
            exit 1
          fi
          if [ -z "$GEE_PRIVATE_KEY" ]; then
            echo "Missing secret: GEE_PRIVATE_KEY"
            exit 1
          fi
          if [ -z "$OPENWEATHER_API_KEY" ]; then
            echo "Warning: OPENWEATHER_API_KEY not set — weather.json will not be refreshed this run."
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed backend-data from previous publish
        run: |
          mkdir -p backend-data
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          for f in timeseries_scenes.json map_layers.json district_analytics.json weather.json historical_trends.json; do
            if git show origin/gh-pages:"$f" > "backend-data/$f.tmp" 2>/dev/null; then
              mv "backend-data/$f.tmp" "backend-data/$f"
            else
              rm -f "backend-data/$f.tmp"
            fi
          done

      - name: Precompute timeseries dataset
        env:
          GEE_SERVICE_ACCOUNT: ${{ secrets.GEE_SERVICE_ACCOUNT }}
          GEE_PRIVATE_KEY: ${{ secrets.GEE_PRIVATE_KEY }}
          PRECOMPUTE_DAYS: ${{ secrets.PRECOMPUTE_DAYS }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python scripts/precompute_timeseries_backend.py

      - name: Ensure pages content root
        run: |
          mkdir -p public
          cp -r web/* public/
          cp delhi_admin.geojson public/
          cp -r backend-data/* public/

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          force_orphan: true
